openapi: 3.0.3
info:
  title: Hint Health API
  description: REST API providing programmatic access to Hint Health's direct primary
    care platform, covering patient and membership management, billing, charges, invoices,
    clinical data, practice configuration, partner integrations, and webhook event
    delivery.
  version: '1.0'
  contact:
    name: Hint Health Developer Support
    email: devsupport@hint.com
    url: https://developers.hint.com
  license:
    name: Private
  termsOfService: https://www.hint.com/terms
servers:
- url: https://api.hint.com/api
  description: Production
- url: https://api.sandbox.hint.com/api
  description: Sandbox
security:
- BearerAuth: []
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Practice access token or Partner API key (Bearer authentication)
  schemas:
    Public.AffiliateBillBlueprint_all:
      type: array
      items:
        type: object
        properties:
          id:
            type: string
          amount_in_cents:
            type: integer
            format: int32
          human_status:
            type: string
          invoice_date:
            type: string
            format: date
          invoice_number:
            type: string
          paid_at:
            type: string
            format: date-time
          paid_in_cents:
            type: integer
            format: int32
          company:
            $ref: '#/components/schemas/Public.CompanyBlueprint_leaf'
    Public.CompanyBlueprint_leaf:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
    Public.AffiliationBlueprint_all:
      type: array
      items:
        type: object
        properties:
          id:
            type: string
          name:
            type: string
    Provider.Affiliates.PatientsController.create_body:
      type: object
      properties:
        patient_id:
          type: string
      required:
      - patient_id
    Public.AffiliationBlueprint_affiliate_min:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
    Public.CancellationReasonBlueprint_all:
      type: array
      items:
        type: object
        properties:
          id:
            type: string
          description:
            type: string
    Association:
      type: object
      properties:
        id:
          type: string
      required:
      - id
    ChargeItem:
      type: object
      properties:
        id:
          type: string
          description: Optional if name, code and code_type are specified
        name:
          type: string
          description: Required if no ID
        code:
          type: string
          description: Required if no ID
        code_type:
          type: string
          description: Required if no ID
          enum:
          - cpt
          - ndc
          - loinc
          - snowmed
        manufacturer:
          type: string
        days_supply:
          type: integer
      required:
      - id
      - name
      - code
      - code_type
    Category:
      type: object
      properties:
        id:
          type: string
          description: Optional if type is specified
        type:
          type: string
          description: Ignored if ID is specified
          enum:
          - memberships
          - labs
          - medications
          - vitamins_and_supplements
          - vaccines
          - imaging
          - supplies_and_dme
          - retail_items
          - office_visits
          - procedures
          - fees
      required:
      - id
      - type
    Provider.ChargesController.create_body:
      type: object
      properties:
        charge_item:
          $ref: '#/components/schemas/ChargeItem'
        patient:
          $ref: '#/components/schemas/Association'
        quantity:
          type: integer
          format: int32
        price_in_cents:
          type: number
          format: double
        description:
          type: string
        date:
          type: string
          format: date
        category:
          $ref: '#/components/schemas/Category'
        practitioner:
          $ref: '#/components/schemas/Association'
        location:
          $ref: '#/components/schemas/Association'
      required:
      - charge_item
      - patient
    Common.EmergencyContactBlueprint_shared:
