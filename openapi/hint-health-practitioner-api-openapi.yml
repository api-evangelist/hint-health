                  address_latitude: 40.7227998
                  address_line1: 157 E Houston St
                  address_line2: Suite 2402
                  address_longitude: -73.9892241
                  address_state: NY
                  address_zip: '10002'
                  distance: null
                  name: San Francisco HQ
                  phone_number: '5553050019'
                  virtual: false
                  location_group:
                    id: prg-ab12C345DeF6
                    created_at: '2017-02-05T06:23:00.000000-08:00'
                    integration_record_id: null
                    name: Downtown Location Group
                    updated_at: '2017-02-05T06:23:00.000000-08:00'
                npi:
                  first_name: REGINALD
                  last_name: DWIGHT
                  number: 0123456879
                  organization_name: HINT HEALTH
                  type: individual
                specialties:
                - id: spe-ab12C345DeF6
                  name: Internal Medicine
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Provider.PractitionersController.create_body'
    get:
      tags:
      - Practitioner
      operationId: Practitioner.ProviderPractitioners
      summary: List All Practitioners
      description: ''
      parameters:
      - name: near_zip
        in: query
        required: false
        description: The zip code in the centre of your search
        schema:
          type: string
      - name: distance
        in: query
        required: false
        description: The search radius in miles. Defaults to 20 if near_zip is not blank
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Public.PractitionerBlueprint_all'
              example:
              - id: pct-ab12C345DeF6
                accepts_enrollments_from_employer: true
                accepts_enrollments_from_retail: true
                bio: Reginalds biography...
                created_at: '2017-02-05T06:23:00.000000-08:00'
                education:
                - The University of Hint
